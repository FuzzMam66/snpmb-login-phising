<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Portal Login</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
      background-color: #f7f9fc;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding-top: 60px;
    }

    .logo-area {
      margin-bottom: 32px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .card {
      background: #ffffff;
      border-radius: 8px;
      border: 1px solid #e1e4e8;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
      padding: 32px 40px;
      width: 100%;
      max-width: 420px;
      position: relative;
    }

    .card-title {
      font-size: 24px;
      font-weight: 700;
      color: #1a1a1a;
      margin-bottom: 8px;
    }

    .card-desc {
      font-size: 14px;
      color: #666;
      line-height: 1.5;
      margin-bottom: 24px;
    }

    /* Error Box Styling */
    .error-box {
      background-color: #fff5f5;
      border-left: 4px solid #f56565;
      color: #c53030;
      padding: 12px 16px;
      border-radius: 4px;
      font-size: 13px;
      margin-bottom: 20px;
      display: none;
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-5px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-label-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }

    label {
      font-size: 14px;
      color: #4a5568;
      font-weight: 500;
    }

    .forgot-link {
      font-size: 13px;
      color: #1a6ff5;
      text-decoration: none;
    }

    .forgot-link:hover {
      text-decoration: underline;
    }

    input[type="email"],
    input[type="password"],
    input[type="text"] {
      width: 100%;
      padding: 12px 14px;
      font-size: 15px;
      border: 1.5px solid #e2e8f0;
      border-radius: 6px;
      outline: none;
      color: #2d3748;
      background: #fff;
      transition: all 0.2s ease;
    }

    input[type="email"]:focus,
    input[type="password"]:focus,
    input[type="text"]:focus {
      border-color: #1a6ff5;
      box-shadow: 0 0 0 3px rgba(26, 111, 245, 0.1);
    }

    /* Password Wrapper & Toggle */
    .password-wrapper {
      position: relative;
    }

    .toggle-password {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      cursor: pointer;
      color: #a0aec0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 4px;
      transition: color 0.2s;
    }

    .toggle-password:hover {
      color: #4a5568;
    }

    .btn-masuk {
      width: 100%;
      padding: 12px;
      background-color: #1a6ff5;
      color: #fff;
      font-size: 16px;
      font-weight: 600;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      margin-top: 8px;
      transition: all 0.2s ease;
    }

    .btn-masuk:hover {
      background-color: #155ed4;
      box-shadow: 0 4px 12px rgba(26, 111, 245, 0.2);
    }

    .btn-masuk:active {
      transform: scale(0.98);
    }

    footer {
      margin-top: 32px;
      font-size: 13px;
      color: #718096;
    }
  </style>
</head>
<body>

  <div class="logo-area">
    <img src="logo-snpmb.png" alt="Logo" style="height: 56px;" />
  </div>

  <div class="card">
    <h1 class="card-title">Masuk ke Portal</h1>
    <p class="card-desc">Portal resmi Seleksi Nasional Penerimaan Mahasiswa Baru.</p>

    <!-- Notifikasi Error -->
    <div id="errorBox" class="error-box"></div>

    <div class="form-group">
      <label for="email">Email</label>
      <input type="email" id="email" name="email" placeholder="example@gmail.com" />
    </div>

    <div class="form-group">
      <div class="form-label-row">
        <label for="password">Kata sandi</label>
        <a href="#" class="forgot-link" onclick="handleForgotPassword(event)">Lupa kata sandi?</a>
      </div>
      <div class="password-wrapper">
        <input type="password" id="password" name="password" placeholder="********" />
        <span class="toggle-password" onclick="togglePassword()">
          <svg id="eyeIcon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
            <circle cx="12" cy="12" r="3"></circle>
          </svg>
        </span>
      </div>
    </div>

    <button id="loginBtn" class="btn-masuk" onclick="handleLogin()">Masuk</button>
  </div>

  <footer>&#169; 2026 Tim Pelaksana SNPMB. v2.3.17</footer>

  <script>
    function togglePassword() {
      const passwordInput = document.getElementById('password');
      const eyeIcon = document.getElementById('eyeIcon');
      
      if (passwordInput.type === 'password') {
        passwordInput.type = 'text';
        // Change to Eye Off Icon
        eyeIcon.innerHTML = `
          <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path>
          <line x1="1" y1="1" x2="23" y2="23"></line>
        `;
      } else {
        passwordInput.type = 'password';
        // Change back to Eye Icon
        eyeIcon.innerHTML = `
          <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
          <circle cx="12" cy="12" r="3"></circle>
        `;
      }
    }

    function showError(message) {
      const errorBox = document.getElementById('errorBox');
      errorBox.textContent = message;
      errorBox.style.display = 'block';
    }

    function hideError() {
      document.getElementById('errorBox').style.display = 'none';
    }

    async function handleLogin() {
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const loginBtn = document.getElementById('loginBtn');

      hideError();

      if (!email || !password) {
        showError('Silakan isi email dan kata sandi yang valid.');
        return;
      }

      loginBtn.disabled = true;
      loginBtn.textContent = 'Memproses...';

      try {
        const response = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });
        
        const data = await response.json();
        
        if (data.success) {
          window.location.href = data.redirect;
        } else {
          showError(data.message);
          loginBtn.disabled = false;
          loginBtn.textContent = 'Masuk';
        }
      } catch (error) {
        console.error('Error saat login:', error);
        showError('Terjadi kesalahan koneksi ke server.');
        loginBtn.disabled = false;
        loginBtn.textContent = 'Masuk';
      }
    }

    function handleForgotPassword(e) {
      e.preventDefault();
      showError('Fitur pemulihan kata sandi sedang dalam pemeliharaan.');
    }
  </script>

</body>
</html>
