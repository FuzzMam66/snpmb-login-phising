<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Portal Login</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
      background-color: #ffffff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding-top: 60px;
    }

    .logo-area {
      margin-bottom: 32px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo-icon {
      width: 52px;
      height: 52px;
    }

    .logo-text {
      display: flex;
      flex-direction: column;
      line-height: 1.1;
    }

    .logo-title {
      font-size: 28px;
      font-weight: 800;
      color: #1a5aab;
      letter-spacing: 1px;
    }

    .logo-subtitle {
      font-size: 9px;
      color: #1a5aab;
      letter-spacing: 0.3px;
    }

    .card {
      background: #ffffff;
      border-radius: 6px;
      border: 1.5px solid #c8c8c8;
      box-shadow: 0 6px 32px rgba(0, 0, 0, 0.18), 0 2px 8px rgba(0, 0, 0, 0.12);
      padding: 28px 40px 32px;
      width: 100%;
      max-width: 400px;
    }

    .card-title {
      font-size: 25px;
      font-weight: 700;
      color: #1a1a1a;
      margin-bottom: 8px;
    }

    .card-desc {
      font-size: 16px;
      color: #444;
      line-height: 1.5;
      margin-bottom: 24px;
    }

    .form-group {
      margin-bottom: 16px;
    }

    .form-label-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 6px;
    }

    label {
      font-size: 14px;
      color: #666;
      font-weight: 400;
    }

    .forgot-link {
      font-size: 14px;
      color: #1a5aab;
      text-decoration: none;
    }

    .forgot-link:hover {
      text-decoration: underline;
    }

    input[type="email"],
    input[type="password"] {
      width: 100%;
      padding: 10px 12px;
      font-size: 14px;
      border: 1px solid #ccc;
      border-radius: 6px;
      outline: none;
      color: #222;
      background: #fff;
      transition: border-color 0.2s;
    }

    input[type="email"]:focus,
    input[type="password"]:focus {
      border-color: #1a5aab;
      box-shadow: 0 0 0 3px rgba(26, 90, 171, 0.1);
    }

    .btn-masuk {
      width: 100%;
      padding: 11px;
      background-color: #1a6ff5;
      color: #fff;
      font-size: 15px;
      font-weight: 400;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      margin-top: 8px;
      transition: background-color 0.2s;
    }

    .btn-masuk:hover {
      background-color: #155ed4;
    }

    .btn-masuk:active {
      background-color: #1050b8;
    }

    footer {
      margin-top: 28px;
      font-size: 16px;
      color: #666;
    }
  </style>
</head>
<body>

  <div class="logo-area">
  <img src="logo-snpmb.png" alt="Logo" style="height: 60px;" />
</div>

  <div class="card">
    <h1 class="card-title">Masuk ke Portal SNPMB</h1>
    <p class="card-desc">Masukkan alamat email dan kata sandi Akun SNPMB Anda yang terdaftar.</p>

    <div class="form-group">
      <label for="email">Email</label>
      <input type="email" id="email" name="email" placeholder="example@gmail.com" autocomplete="email" />
    </div>

    <div class="form-group">
      <div class="form-label-row">
        <label for="password">Kata sandi</label>
        <a href="#" class="forgot-link" onclick="handleForgotPassword(event)">Lupa kata sandi?</a>
      </div>
      <input type="password" id="password" name="password" placeholder="********" autocomplete="current-password" />
    </div>

    <button class="btn-masuk" onclick="handleLogin()">Masuk</button>
  </div>

  <footer>&#169; 2026 Tim Pelaksana SNPMB. <em>v2.3.17</em></footer>

  <script>
    async function handleLogin() {
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      if (!email || !password) {
        alert('Silakan isi email dan kata sandi');
        return;
      }

      // Tambahkan logika login di sini
      try {
        const response = await fetch('/api/login', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ email, password })
        });
        
        const data = await response.json();
        
        if (data.success) {
          window.location.href = data.redirect;
        } else {
          alert(data.message);
        }
      } catch (error) {
        console.error('Error saat login:', error);
        alert('Terjadi kesalahan koneksi ke server.');
      }
    }

    function handleForgotPassword(e) {
      e.preventDefault();
      // Tambahkan logika lupa kata sandi di sini
    }
  </script>

</body>
</html>
